apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: {{ .Values.namespace }}

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: product-service

  template:
    metadata:
      labels:
        app: product-service

    spec:
      containers:
      - name: product-service

        image: "{{ .Values.image.product.repository }}:{{ .Values.image.product.tag }}"

        imagePullPolicy: Always

        ports:
        - containerPort: 3001

        envFrom:
        - secretRef:
            name: postgres-secret
