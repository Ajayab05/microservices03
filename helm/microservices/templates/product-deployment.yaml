apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: {{ .Values.namespace }}

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: user-service

  template:
    metadata:
      labels:
        app: user-service

    spec:
      containers:
      - name: user-service

        image: "{{ .Values.image.user.repository }}:{{ .Values.image.user.tag }}"

        imagePullPolicy: Always

        ports:
        - containerPort: 3001

        envFrom:
        - secretRef:
            name: postgres-secret