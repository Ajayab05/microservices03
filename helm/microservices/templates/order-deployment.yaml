apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: {{ .Values.namespace }}

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: order-service

  template:
    metadata:
      labels:
        app: order-service

    spec:
      containers:
      - name: order-service

        image: "{{ .Values.image.order.repository }}:{{ .Values.image.order.tag }}"

        imagePullPolicy: Always

        ports:
        - containerPort: 3002

        envFrom:
        - secretRef:
            name: postgres-secret